<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3단계 중급 · 서울경기 어린이 등산 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:#FFF3E0;color:#3E2723;}
  .nav{display:flex;gap:0;border-bottom:3px solid #BF360C;}
  .nav a{flex:1;text-align:center;padding:14px 0;font-size:15px;font-weight:700;text-decoration:none;transition:all .2s;}
  .nav a.active{color:white;}
  .nav a:not(.active){color:#666;background:#f5f5f5;}
  .nav a:not(.active):hover{background:#e0e0e0;}
  .nav-green{background:#43A047;}
  .nav-yellow{background:#F9A825;}
  .nav-orange{background:#E64A19;}
  .header{background:linear-gradient(135deg,#E64A19,#BF360C);color:white;padding:28px 32px 22px;position:relative;overflow:hidden;}
  .header::after{content:'';position:absolute;top:-30px;right:-30px;width:180px;height:180px;background:rgba(255,255,255,0.06);border-radius:50%;}
  .header h1{font-size:32px;font-weight:900;letter-spacing:-1px;margin-bottom:4px;}
  .header .en{font-size:16px;opacity:0.8;font-weight:500;}
  .header .meta{margin-top:10px;display:flex;gap:16px;flex-wrap:wrap;}
  .header .tag{background:rgba(255,255,255,0.2);padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;}
  .header .warn{background:rgba(255,255,255,0.3);padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;border:1px solid rgba(255,255,255,0.5);}
  .layout{display:grid;grid-template-columns:1fr 420px;min-height:calc(100vh - 200px);}
  #map{width:100%;height:100%;min-height:600px;}
  .sidebar{background:white;overflow-y:auto;max-height:calc(100vh - 200px);border-left:3px solid #FFCCBC;}
  .sidebar-header{padding:16px 20px 12px;background:#FBE9E7;border-bottom:2px solid #FFCCBC;position:sticky;top:0;z-index:10;}
  .sidebar-header h2{font-size:18px;font-weight:800;color:#BF360C;}
  .sidebar-header p{font-size:12px;color:#6D4C41;margin-top:2px;}
  .card{display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #FBE9E7;cursor:pointer;transition:background .15s;}
  .card:hover{background:#FFF3E0;}
  .card.active{background:#FFCCBC;border-left:4px solid #E64A19;}
  .num{width:40px;height:40px;border-radius:50%;background:#E64A19;color:white;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0;}
  .name{font-size:17px;font-weight:800;color:#3E2723;line-height:1.3;}
  .route{font-size:12px;color:#8D6E63;margin-top:2px;}
  .addr{font-size:11px;color:#A1887F;margin-top:1px;}
  .time{font-size:12px;font-weight:700;padding:4px 12px;border-radius:14px;background:#FBE9E7;color:#BF360C;white-space:nowrap;flex-shrink:0;text-align:center;line-height:1.4;}
  .home-badge{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#FFF8E1;border-bottom:2px solid #FFE082;font-size:13px;font-weight:700;color:#4E342E;}
  .home-dot{width:14px;height:14px;background:#FFD600;border:2px solid #F57F17;border-radius:50%;flex-shrink:0;}
  .warning-banner{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#FBE9E7;border-bottom:2px solid #FFAB91;font-size:13px;font-weight:700;color:#BF360C;}
  .warning-icon{width:28px;height:28px;background:#E64A19;color:white;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0;}
  @media(max-width:900px){
    .layout{grid-template-columns:1fr;grid-template-rows:45vh auto;}
    .sidebar{max-height:none;border-left:none;border-top:3px solid #FFCCBC;}
  }
  @media(max-width:430px){
    .nav{border-bottom-width:2px;}
    .nav a{padding:10px 4px;font-size:12px;font-weight:800;line-height:1.3;}
    .nav .mob-hide{display:none;}
    .header{padding:16px 16px 14px;}
    .header::after{width:100px;height:100px;top:-20px;right:-20px;}
    .header h1{font-size:20px;letter-spacing:-0.5px;line-height:1.3;}
    .header .en{font-size:12px;margin-top:2px;}
    .header .meta{margin-top:8px;gap:6px;}
    .header .tag{padding:3px 10px;font-size:11px;}
    .header .warn{padding:3px 10px;font-size:11px;}
    .layout{grid-template-columns:1fr;grid-template-rows:38vh auto;}
    #map{min-height:250px;}
    .sidebar{border-top:2px solid #FFCCBC;}
    .sidebar-header{padding:12px 14px 8px;}
    .sidebar-header h2{font-size:15px;}
    .sidebar-header p{font-size:11px;}
    .home-badge{padding:8px 14px;font-size:12px;}
    .home-dot{width:12px;height:12px;}
    .warning-banner{padding:8px 12px;font-size:12px;gap:8px;}
    .warning-icon{width:24px;height:24px;font-size:14px;}
    .card{grid-template-columns:36px 1fr auto;gap:8px;padding:10px 12px;}
    .num{width:34px;height:34px;font-size:13px;}
    .name{font-size:15px;}
    .route{font-size:11px;}
    .addr{font-size:10px;}
    .time{font-size:11px;padding:3px 8px;border-radius:10px;}
  }
</style>
</head>
<body>
<div class="nav">
  <a href="level1_warmup.html" class="nav-green">1단계 입문 <span class="mob-hide">(Warm-up)</span></a>
  <a href="level2_basic.html" class="nav-yellow">2단계 초급 <span class="mob-hide">(Basic)</span></a>
  <a href="level3_intermediate.html" class="nav-orange active">3단계 중급 <span class="mob-hide">(Intermediate)</span></a>
</div>
<div class="header">
  <h1>서울·경기 어린이 등산 지도: 3단계 중급</h1>
  <div class="en">Intermediate, Level 3 — 산 15곳</div>
  <div class="meta">
    <span class="tag">표고 400m 이상</span>
    <span class="tag">왕복 2시간 이상</span>
    <span class="warn">! 보호자 동반 필수</span>
    <span class="warn">체력 요구</span>
    <span class="tag">출발: 성동구 금호동</span>
  </div>
</div>
<div class="layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="home-badge"><div class="home-dot"></div>출발 기준: 성동구 금호동 자택</div>
    <div class="warning-banner">
      <div class="warning-icon">!</div>
      보호자 동반 필수 · 충분한 체력 필요 · 등산 장비 준비
    </div>
    <div class="sidebar-header">
      <h2>산 목록 (36~50)</h2>
      <p>카드를 클릭하면 지도에서 위치를 확인할 수 있습니다</p>
    </div>
    <div id="card-list"></div>
  </div>
</div>

<script>
const HOME=[37.5572,127.0148];
const mountains=[
  {n:36,name:'북한산(둘레길)',lat:37.6590,lng:126.9780,route:'금호동 → 북한산둘레길',addr:'은평구 진관동',time:'차량 40분',elev:'836m(둘레길)'},
  {n:37,name:'청계산',lat:37.4380,lng:127.0550,route:'금호동 → 청계산',addr:'서초구 원지동',time:'차량 35분',elev:'618m'},
  {n:38,name:'관악산(계곡)',lat:37.4430,lng:126.9640,route:'금호동 → 관악산계곡',addr:'관악구 신림동',time:'차량 30분',elev:'632m(계곡코스)'},
  {n:39,name:'도봉산(마당바위)',lat:37.6980,lng:127.0150,route:'도봉산역 → 마당바위',addr:'도봉구 도봉동',time:'차량 40분',elev:'739m(마당바위)'},
  {n:40,name:'남한산성',lat:37.4790,lng:127.1790,route:'금호동 → 남한산성',addr:'광주시 남한산성면',time:'차량 35분',elev:'522m'},
  {n:41,name:'수락산',lat:37.6720,lng:127.0720,route:'수락산역 → 수락산',addr:'노원구 상계동',time:'차량 35분',elev:'638m'},
  {n:42,name:'불암산',lat:37.6650,lng:127.0880,route:'불암산역 → 불암산',addr:'노원구 중계동',time:'차량 35분',elev:'508m'},
  {n:43,name:'유명산',lat:37.5930,lng:127.5230,route:'금호동 → 유명산',addr:'가평군 설악면',time:'차량 80분',elev:'862m'},
  {n:44,name:'마니산',lat:37.6270,lng:126.4330,route:'금호동 → 마니산',addr:'인천시 강화군',time:'차량 90분',elev:'469m'},
  {n:45,name:'축령산',lat:37.7240,lng:127.2730,route:'금호동 → 축령산',addr:'남양주시 수동면',time:'차량 60분',elev:'879m'},
  {n:46,name:'운길산',lat:37.5920,lng:127.3120,route:'금호동 → 운길산',addr:'남양주시 조안면',time:'차량 55분',elev:'610m'},
  {n:47,name:'명지산',lat:37.8350,lng:127.3520,route:'금호동 → 명지산',addr:'가평군 북면',time:'차량 90분',elev:'1267m'},
  {n:48,name:'화야산',lat:37.7080,lng:127.4280,route:'금호동 → 화야산',addr:'가평군 외서면',time:'차량 70분',elev:'756m'},
  {n:49,name:'소요산',lat:37.9070,lng:127.0790,route:'금호동 → 소요산',addr:'동두천시 소요동',time:'차량 70분',elev:'587m'},
  {n:50,name:'감악산',lat:37.9510,lng:126.9450,route:'금호동 → 감악산',addr:'파주시 적성면',time:'차량 80분',elev:'675m'},
];

const map=L.map('map',{zoomControl:true}).setView([37.60,127.05],9);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap, © CARTO',maxZoom:18}).addTo(map);

const homeIcon=L.divIcon({className:'',html:`<div style="width:24px;height:24px;background:#FFD600;border:3px solid #F57F17;border-radius:50%;box-shadow:0 0 0 6px rgba(255,214,0,0.25),0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#4E342E;">H</div>`,iconSize:[24,24],iconAnchor:[12,12]});
L.marker(HOME,{icon:homeIcon,zIndex:1000}).addTo(map).bindPopup(`<b style="font-family:'Noto Sans KR';font-size:14px;">성동구 금호동 자택</b><br><span style="font-family:'Noto Sans KR';font-size:12px;color:#666;">(출발점)</span>`);

const markers=[];
mountains.forEach(m=>{
  const icon=L.divIcon({className:'',html:`<div style="width:32px;height:32px;border-radius:50%;background:#E64A19;border:2px solid #BF360C;color:white;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.3);font-family:'Noto Sans KR';">${m.n}</div>`,iconSize:[32,32],iconAnchor:[16,16]});
  const marker=L.marker([m.lat,m.lng],{icon}).addTo(map);
  marker.bindPopup(`<div style="font-family:'Noto Sans KR';min-width:180px;"><div style="font-size:18px;font-weight:800;color:#3E2723;margin-bottom:4px;">${m.n}. ${m.name}</div><div style="font-size:13px;color:#6D4C41;margin-bottom:2px;">${m.route}</div><div style="font-size:12px;color:#A1887F;margin-bottom:6px;">${m.addr}</div><div style="display:inline-block;background:#FBE9E7;color:#BF360C;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;">자택 ${m.time}</div><div style="display:inline-block;background:#FFF3E0;color:#E65100;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;margin-left:4px;">표고 ${m.elev}</div></div>`);
  markers.push(marker);
});
map.fitBounds([HOME,...mountains.map(m=>[m.lat,m.lng])],{padding:[30,30]});

const cardList=document.getElementById('card-list');
mountains.forEach((m,i)=>{
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=`<div class="num">${m.n}</div><div class="info"><div class="name">${m.name}</div><div class="route">${m.route}</div><div class="addr">${m.addr} · 표고 ${m.elev}</div></div><div class="time">자택<br>${m.time}</div>`;
  card.addEventListener('click',()=>{document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));card.classList.add('active');map.setView([m.lat,m.lng],14,{animate:true});markers[i].openPopup();});
  cardList.appendChild(card);
});
</script>
</body>
</html>
