<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2단계 초급 · 서울경기 어린이 등산 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:#FFFDE7;color:#4E342E;}
  .nav{display:flex;gap:0;border-bottom:3px solid #EF6C00;}
  .nav a{flex:1;text-align:center;padding:14px 0;font-size:15px;font-weight:700;text-decoration:none;transition:all .2s;}
  .nav a.active{color:white;}
  .nav a:not(.active){color:#666;background:#f5f5f5;}
  .nav a:not(.active):hover{background:#e0e0e0;}
  .nav-green{background:#43A047;}
  .nav-yellow{background:#F9A825;}
  .nav-orange{background:#E64A19;}
  .header{background:linear-gradient(135deg,#F9A825,#EF6C00);color:white;padding:28px 32px 22px;position:relative;overflow:hidden;}
  .header::after{content:'';position:absolute;top:-30px;right:-30px;width:180px;height:180px;background:rgba(255,255,255,0.06);border-radius:50%;}
  .header h1{font-size:32px;font-weight:900;letter-spacing:-1px;margin-bottom:4px;}
  .header .en{font-size:16px;opacity:0.8;font-weight:500;}
  .header .meta{margin-top:10px;display:flex;gap:16px;flex-wrap:wrap;}
  .header .tag{background:rgba(255,255,255,0.2);padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;}
  .layout{display:grid;grid-template-columns:1fr 420px;min-height:calc(100vh - 200px);}
  #map{width:100%;height:100%;min-height:600px;}
  .sidebar{background:white;overflow-y:auto;max-height:calc(100vh - 200px);border-left:3px solid #FFECB3;}
  .sidebar-header{padding:16px 20px 12px;background:#FFF8E1;border-bottom:2px solid #FFECB3;position:sticky;top:0;z-index:10;}
  .sidebar-header h2{font-size:18px;font-weight:800;color:#E65100;}
  .sidebar-header p{font-size:12px;color:#6D4C41;margin-top:2px;}
  .card{display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #FFF8E1;cursor:pointer;transition:background .15s;}
  .card:hover{background:#FFF8E1;}
  .card.active{background:#FFECB3;border-left:4px solid #F9A825;}
  .num{width:40px;height:40px;border-radius:50%;background:#F9A825;color:white;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0;}
  .name{font-size:17px;font-weight:800;color:#3E2723;line-height:1.3;}
  .route{font-size:12px;color:#8D6E63;margin-top:2px;}
  .addr{font-size:11px;color:#A1887F;margin-top:1px;}
  .time{font-size:12px;font-weight:700;padding:4px 12px;border-radius:14px;background:#FFF8E1;color:#E65100;white-space:nowrap;flex-shrink:0;text-align:center;line-height:1.4;}
  .home-badge{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#FFF8E1;border-bottom:2px solid #FFE082;font-size:13px;font-weight:700;color:#4E342E;}
  .home-dot{width:14px;height:14px;background:#FFD600;border:2px solid #F57F17;border-radius:50%;flex-shrink:0;}
  @media(max-width:900px){
    .layout{grid-template-columns:1fr;grid-template-rows:45vh auto;}
    .sidebar{max-height:none;border-left:none;border-top:3px solid #FFECB3;}
  }
  @media(max-width:430px){
    .nav{border-bottom-width:2px;}
    .nav a{padding:10px 4px;font-size:12px;font-weight:800;line-height:1.3;}
    .nav .mob-hide{display:none;}
    .header{padding:16px 16px 14px;}
    .header::after{width:100px;height:100px;top:-20px;right:-20px;}
    .header h1{font-size:20px;letter-spacing:-0.5px;line-height:1.3;}
    .header .en{font-size:12px;margin-top:2px;}
    .header .meta{margin-top:8px;gap:6px;}
    .header .tag{padding:3px 10px;font-size:11px;}
    .layout{grid-template-columns:1fr;grid-template-rows:38vh auto;}
    #map{min-height:250px;}
    .sidebar{border-top:2px solid #FFECB3;}
    .sidebar-header{padding:12px 14px 8px;}
    .sidebar-header h2{font-size:15px;}
    .sidebar-header p{font-size:11px;}
    .home-badge{padding:8px 14px;font-size:12px;}
    .home-dot{width:12px;height:12px;}
    .card{grid-template-columns:36px 1fr auto;gap:8px;padding:10px 12px;}
    .num{width:34px;height:34px;font-size:13px;}
    .name{font-size:15px;}
    .route{font-size:11px;}
    .addr{font-size:10px;}
    .time{font-size:11px;padding:3px 8px;border-radius:10px;}
  }
</style>
</head>
<body>
<div class="nav">
  <a href="level1_warmup.html" class="nav-green">1단계 입문 <span class="mob-hide">(Warm-up)</span></a>
  <a href="level2_basic.html" class="nav-yellow active">2단계 초급 <span class="mob-hide">(Basic)</span></a>
  <a href="level3_intermediate.html" class="nav-orange">3단계 중급 <span class="mob-hide">(Intermediate)</span></a>
</div>
<div class="header">
  <h1>서울·경기 어린이 등산 지도: 2단계 초급</h1>
  <div class="en">Basic, Level 2 — 산 20곳</div>
  <div class="meta">
    <span class="tag">표고 200~400m</span>
    <span class="tag">왕복 1~2시간</span>
    <span class="tag">약간의 오르막 있음</span>
    <span class="tag">출발: 성동구 금호동</span>
  </div>
</div>
<div class="layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="home-badge"><div class="home-dot"></div>출발 기준: 성동구 금호동 자택</div>
    <div class="sidebar-header">
      <h2>산 목록 (16~35)</h2>
      <p>카드를 클릭하면 지도에서 위치를 확인할 수 있습니다</p>
    </div>
    <div id="card-list"></div>
  </div>
</div>

<script>
const HOME=[37.5572,127.0148];
const mountains=[
  {n:16,name:'아차산',lat:37.5720,lng:127.1030,route:'아차산역 → 아차산 정상',addr:'광진구 중곡동',time:'차량 15분',elev:'287m'},
  {n:17,name:'용마산',lat:37.5760,lng:127.0880,route:'용마산역 → 용마산 정상',addr:'중랑구 면목동',time:'차량 20분',elev:'348m'},
  {n:18,name:'대모산',lat:37.4770,lng:127.0780,route:'대모산입구역 → 정상',addr:'강남구 개포동',time:'차량 25분',elev:'293m'},
  {n:19,name:'인왕산',lat:37.5835,lng:126.9570,route:'독립문역 → 인왕산',addr:'종로구 부암동',time:'차량 25분',elev:'338m'},
  {n:20,name:'소래산',lat:37.3960,lng:126.8010,route:'금호동 → 소래산',addr:'시흥시 대야동',time:'차량 50분',elev:'299m'},
  {n:21,name:'불곡산(성남)',lat:37.4100,lng:127.1180,route:'금호동 → 불곡산',addr:'성남시 분당구',time:'차량 45분',elev:'342m'},
  {n:22,name:'검단산(하남)',lat:37.5280,lng:127.1670,route:'금호동 → 검단산',addr:'하남시 감일동',time:'차량 35분',elev:'382m'},
  {n:23,name:'천마산',lat:37.6400,lng:127.2350,route:'금호동 → 천마산',addr:'남양주시 화도읍',time:'차량 50분',elev:'812m(초급코스)'},
  {n:24,name:'수리산',lat:37.3740,lng:126.9170,route:'금호동 → 수리산',addr:'안양시 만안구',time:'차량 45분',elev:'395m'},
  {n:25,name:'오봉산',lat:37.6940,lng:127.1730,route:'금호동 → 오봉산',addr:'남양주시 진접읍',time:'차량 55분',elev:'319m'},
  {n:26,name:'우면산',lat:37.4730,lng:127.0040,route:'예술의전당역 → 우면산',addr:'서초구 우면동',time:'차량 25분',elev:'293m'},
  {n:27,name:'구룡산',lat:37.4680,lng:127.0750,route:'구룡역 → 구룡산',addr:'강남구 개포동',time:'차량 25분',elev:'306m'},
  {n:28,name:'봉제산',lat:37.5730,lng:126.8280,route:'금호동 → 봉제산',addr:'강서구 방화동',time:'차량 40분',elev:'126m'},
  {n:29,name:'일자산',lat:37.5250,lng:127.1430,route:'둔촌역 → 일자산',addr:'강동구 둔촌동',time:'차량 25분',elev:'134m'},
  {n:30,name:'문수산',lat:37.7470,lng:126.6350,route:'금호동 → 문수산',addr:'김포시 월곶면',time:'차량 60분',elev:'376m'},
  {n:31,name:'궁산',lat:37.5680,lng:126.8430,route:'가양역 → 궁산',addr:'강서구 가양동',time:'차량 35분',elev:'74m'},
  {n:32,name:'호암산',lat:37.4590,lng:126.9380,route:'신림역 → 호암산',addr:'관악구 신림동',time:'차량 30분',elev:'393m'},
  {n:33,name:'백마산',lat:37.6830,lng:126.8150,route:'금호동 → 백마산',addr:'고양시 일산동구',time:'차량 50분',elev:'185m'},
  {n:34,name:'행주산성',lat:37.6050,lng:126.8330,route:'금호동 → 행주산성',addr:'고양시 덕양구',time:'차량 40분',elev:'124m'},
  {n:35,name:'노고산',lat:37.5590,lng:126.9380,route:'신촌역 → 노고산',addr:'마포구 노고산동',time:'차량 25분',elev:'104m'},
];

const map=L.map('map',{zoomControl:true}).setView([37.52,127.00],10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap, © CARTO',maxZoom:18}).addTo(map);

const homeIcon=L.divIcon({className:'',html:`<div style="width:24px;height:24px;background:#FFD600;border:3px solid #F57F17;border-radius:50%;box-shadow:0 0 0 6px rgba(255,214,0,0.25),0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#4E342E;">H</div>`,iconSize:[24,24],iconAnchor:[12,12]});
L.marker(HOME,{icon:homeIcon,zIndex:1000}).addTo(map).bindPopup(`<b style="font-family:'Noto Sans KR';font-size:14px;">성동구 금호동 자택</b><br><span style="font-family:'Noto Sans KR';font-size:12px;color:#666;">(출발점)</span>`);

const markers=[];
mountains.forEach(m=>{
  const icon=L.divIcon({className:'',html:`<div style="width:32px;height:32px;border-radius:50%;background:#F9A825;border:2px solid #E65100;color:white;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.3);font-family:'Noto Sans KR';">${m.n}</div>`,iconSize:[32,32],iconAnchor:[16,16]});
  const marker=L.marker([m.lat,m.lng],{icon}).addTo(map);
  marker.bindPopup(`<div style="font-family:'Noto Sans KR';min-width:180px;"><div style="font-size:18px;font-weight:800;color:#3E2723;margin-bottom:4px;">${m.n}. ${m.name}</div><div style="font-size:13px;color:#6D4C41;margin-bottom:2px;">${m.route}</div><div style="font-size:12px;color:#A1887F;margin-bottom:6px;">${m.addr}</div><div style="display:inline-block;background:#FFF8E1;color:#E65100;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;">자택 ${m.time}</div><div style="display:inline-block;background:#FBE9E7;color:#BF360C;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;margin-left:4px;">표고 ${m.elev}</div></div>`);
  markers.push(marker);
});
map.fitBounds([HOME,...mountains.map(m=>[m.lat,m.lng])],{padding:[30,30]});

const cardList=document.getElementById('card-list');
mountains.forEach((m,i)=>{
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=`<div class="num">${m.n}</div><div class="info"><div class="name">${m.name}</div><div class="route">${m.route}</div><div class="addr">${m.addr} · 표고 ${m.elev}</div></div><div class="time">자택<br>${m.time}</div>`;
  card.addEventListener('click',()=>{document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));card.classList.add('active');map.setView([m.lat,m.lng],14,{animate:true});markers[i].openPopup();});
  cardList.appendChild(card);
});
</script>
</body>
</html>
